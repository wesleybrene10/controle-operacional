<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Controle Operacional</title>

    <link rel="icon" href="favicon.svg" type="image/svg+xml">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="topo">

        <h1><span class="logo">DAC</span>Controle Operacional</h1>
        <p>Marcador de Processos</p>

    </header>

    <!-- CONTAINER -->
    <main class="container">

        <!-- PAINEL -->
        <section class="painel-controle">

            <!-- TIPO -->
            <div class="grupo-input">

                <label for="tipoAtividade">
                    Tipo de atividade
                </label>

                <select id="tipoAtividade">

                    <option value="processamento">
                        Processamento
                    </option>

                    <option value="pausa">
                        Pausa
                    </option>

                    <option value="almoco">
                        Almoço
                    </option>

                    <option value="falha">
                        Falha sistêmica
                    </option>

                </select>

            </div>

            <!-- PROCESSO -->
            <div class="grupo-input">

                <label for="numeroProcesso">
                    Número do processo
                </label>

                <input 
                    type="number"
                    id="numeroProcesso"
                    placeholder="Digite o número do processo"
                >

            </div>

        </section>

        <!-- CRONÔMETRO -->
        <section class="cronometro-box">

            <h2>Cronômetro</h2>

            <div id="cronometro">
                00:00:00
            </div>

            <div class="botoes">

                <button id="btnIniciar">
                    Iniciar
                </button>

                <button id="btnFinalizar">
                    Finalizar
                </button>

            </div>

        </section>

        <!-- CARDS -->
        <section class="cards">

            <!-- CARD PROCESSOS -->
            <div class="card processos">

                <h2>Processos</h2>

                <div class="info">
                    <span>Processos feitos:</span>
                    <strong id="totalProcessos">0</strong>
                </div>

                <div class="info">
                    <span>Média:</span>
                    <strong id="mediaProcessos">00:00:00</strong>
                </div>

                <div class="info">
                    <span>Tempo total:</span>
                    <strong id="tempoTotal">00:00:00</strong>
                </div>

                <div class="info">
                    <span>Último processo:</span>
                    <strong id="ultimoProcesso">---</strong>
                </div>

            </div>

            <!-- CARD PAUSAS -->
            <div class="card pausas">

                <h2>Pausas / Falhas</h2>

                <div class="info">
                    <span>Pausa:</span>
                    <strong id="tempoPausa">00:00:00</strong>
                </div>

                <div class="info">
                    <span>Almoço:</span>
                    <strong id="tempoAlmoco">00:00:00</strong>
                </div>

                <div class="info">
                    <span>Falha sistêmica:</span>
                    <strong id="tempoFalha">00:00:00</strong>
                </div>

                <div class="info">
                    <span>Total pausas:</span>
                    <strong id="totalPausas">00:00:00</strong>
                </div>

            </div>

        </section>

        <!-- ABAS HISTÓRICO -->
        <div class="abas-historico" id="abasHistorico">

            <!-- JAVASCRIPT -->

        </div>

        <!-- HISTÓRICO -->
        <section class="historico">

            <div class="historico-topo">

                <h2>Histórico do Dia</h2>

                <button id="btnResetar">
                    Reiniciar Dia
                </button>

            </div>

            <table>

                <thead>

                    <tr>
                        <th>Processo</th>
                        <th>Tipo</th>
                        <th>Tempo</th>
                    </tr>

                </thead>

                <tbody id="historicoBody">

                    <!-- JAVASCRIPT -->

                </tbody>

            </table>

        </section>

    </main>

    <script src="js/script.js"></script>

</body>

</html>
